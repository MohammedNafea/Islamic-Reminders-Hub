<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>مركز الأذكار</title>
  <script>
    // GitHub Pages SPA - Encode path as query param and redirect to /
    (function(){
      var l = window.location;
      var path = l.pathname.slice(1);
      if (!path) return; // already at root
      var search = l.search ? l.search.slice(1) : '';
      var hash = l.hash;
      var qs = path + (search ? '~q~' + search : '');
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/?/' + encodeURIComponent(qs) + hash
      );
    })();
  </script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0a150a;color:#c8a84b;font-family:'Segoe UI',Tahoma,sans-serif;
         display:flex;align-items:center;justify-content:center;min-height:100vh}
    .w{text-align:center}
    .r{width:48px;height:48px;border:3px solid rgba(200,168,75,.15);
       border-top-color:#c8a84b;border-radius:50%;animation:s .9s linear infinite;margin:0 auto 1rem}
    @keyframes s{to{transform:rotate(360deg)}}
    p{font-size:13px;opacity:.6}
  </style>
</head>
<body>
  <div class="w"><div class="r"></div><p>جارٍ التحميل…</p></div>
</body>
</html>
