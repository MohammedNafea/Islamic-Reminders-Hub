    <!-- ═══ GitHub Pages SPA Routing ════════════════════════════════════════ -->
    <script>
      (function(l){
        if(l.search&&l.search[1]==='/'){
          var raw=decodeURIComponent(l.search.slice(2));
          var hi=raw.indexOf('#'),hash=hi>=0?raw.slice(hi):l.hash;
          if(hi>=0)raw=raw.slice(0,hi);
          var ti=raw.indexOf('~q~'),path,query;
          if(ti>=0){path='/'+raw.slice(0,ti);query='?'+raw.slice(ti+3);}
          else{path='/'+raw;query='';}
          window.history.replaceState(null,null,path+query+hash);
        }
      }(window.location));
    </script>
