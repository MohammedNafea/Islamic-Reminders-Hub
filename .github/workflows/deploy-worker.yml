name: 🔐 Deploy Cloudflare Worker (HTTPS Proxy)

on:
  push:
    branches: [main]
    paths:
      - 'workers/adhkar-hub/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch:

jobs:
  deploy-worker:
    name: 🚀 Deploy Security Worker
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ⚙️ Install Wrangler
        run: npm install -g wrangler@latest

      - name: 🚀 Deploy Worker to Cloudflare
        working-directory: workers/adhkar-hub
        run: |
          # Try all available tokens
          TOKENS=("${{ secrets.CF_TOKEN_EDIT_ALL }}" "${{ secrets.CF_TOKEN_MMM }}" "${{ secrets.CF_TOKEN_GUARDIAN }}" "${{ secrets.CF_TOKEN_WORKERS_EDIT }}" "${{ secrets.CF_TOKEN_WORKERS_AI }}" "${{ secrets.CLOUDFLARE_API_TOKEN }}")
          NAMES=("EDIT_ALL" "MMM" "GUARDIAN" "WORKERS_EDIT" "WORKERS_AI" "API_TOKEN")
          DEPLOYED=false
          for i in "${!TOKENS[@]}"; do
            TOKEN="${TOKENS[$i]}"
            NAME="${NAMES[$i]}"
            [ -z "$TOKEN" ] && continue
            echo "🔑 Trying token: $NAME..."
            OUT=$(CLOUDFLARE_API_TOKEN="$TOKEN" wrangler deploy --config wrangler.toml 2>&1)
            if echo "$OUT" | grep -q "Deployed\|Successfully\|https://"; then
              echo "✅ Deployed with $NAME!"
              echo "$OUT"
              DEPLOYED=true
              break
            fi
            echo "❌ $NAME failed: $(echo "$OUT" | tail -3)"
          done
          if [ "$DEPLOYED" = false ]; then
            echo "⚠️ Worker deploy failed - manual deploy required"
            echo "Run: cd workers/adhkar-hub && CLOUDFLARE_API_TOKEN=<token> wrangler deploy"
          fi

      - name: ✅ Done
        run: echo "Worker deployment complete"
