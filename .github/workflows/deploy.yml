name: 🚀 Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25

    permissions:
      contents: read
      deployments: write

    steps:
      # ─── Checkout ───────────────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── Setup pnpm ─────────────────────────────────────────────
      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      # ─── Setup Node ─────────────────────────────────────────────
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      # ─── Install Dependencies ───────────────────────────────────
      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      # ─── Build CSS ──────────────────────────────────────────────
      - name: 🎨 Build TailwindCSS
        run: pnpm run build:css:prod

      # ─── Build App ──────────────────────────────────────────────
      - name: 🏗️ Build Application
        run: pnpm --filter @workspace/adhkar run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      # ─── Install Wrangler ────────────────────────────────────────
      - name: ⚙️ Install Wrangler
        run: npm install -g wrangler@latest

      # ─── Create Pages Project (if not exists) ───────────────────
      - name: 🏗️ Create Cloudflare Pages Project
        run: |
          wrangler pages project create islamic-reminders-hub \
            --production-branch=main 2>/dev/null || echo "Project already exists"
        env:
          CLOUDFLARE_EMAIL: ${{ secrets.CF_EMAIL }}
          CLOUDFLARE_GLOBAL_API_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ─── Deploy to Cloudflare Pages ─────────────────────────────
      - name: ☁️ Deploy to Cloudflare Pages
        run: |
          wrangler pages deploy artifacts/adhkar/dist/public \
            --project-name=islamic-reminders-hub \
            --branch=main \
            --commit-dirty=true
        env:
          CLOUDFLARE_EMAIL: ${{ secrets.CF_EMAIL }}
          CLOUDFLARE_GLOBAL_API_KEY: ${{ secrets.CLOUDFLARE_GLOBAL_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ─── Done ────────────────────────────────────────────────────
      - name: 🌍 Deployment Complete
        run: |
          echo "✅ Deploy succeeded!"
          echo "🔗 URL: https://islamic-reminders-hub.pages.dev"
