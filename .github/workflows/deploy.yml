name: 🚀 Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build:css:prod
      - name: Build App
        run: pnpm --filter @workspace/adhkar run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist-public
          path: artifacts/adhkar/dist/public
          retention-days: 7

  deploy:
    name: ☁️ Deploy
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-public
          path: ./dist

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: 🚀 Deploy (try all tokens)
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          T1: ${{ secrets.CF_TOKEN_EDIT_ALL }}
          T2: ${{ secrets.CF_TOKEN_MMM }}
          T3: ${{ secrets.CF_TOKEN_GUARDIAN }}
          T4: ${{ secrets.CF_TOKEN_PAGES_DEPLOY }}
          T5: ${{ secrets.CF_TOKEN_WORKERS_EDIT }}
          T6: ${{ secrets.CF_TOKEN_CREATE_TOK }}
          T7: ${{ secrets.CF_TOKEN_MO }}
          T8: ${{ secrets.CF_TOKEN_KIN }}
          T9: ${{ secrets.CF_TOKEN_WORKERS_AI }}
          T10: ${{ secrets.CF_TOKEN_AI_GATEWAY }}
          T11: ${{ secrets.CF_GLOBAL_KEY_1 }}
          T12: ${{ secrets.CF_GLOBAL_KEY_2 }}
        run: |
          TOKENS=("$T1" "$T2" "$T3" "$T4" "$T5" "$T6" "$T7" "$T8" "$T9" "$T10" "$T11" "$T12")
          NAMES=("EDIT_ALL" "MMM" "GUARDIAN" "PAGES_DEPLOY" "WORKERS_EDIT" "CREATE_TOK" "MO" "KIN" "WORKERS_AI" "AI_GATEWAY" "GLOBAL_KEY_1" "GLOBAL_KEY_2")
          DEPLOYED=false

          for i in "${!TOKENS[@]}"; do
            TOKEN="${TOKENS[$i]}"
            NAME="${NAMES[$i]}"
            if [ -z "$TOKEN" ]; then
              echo "⏭️  Token $NAME is empty, skipping..."
              continue
            fi
            echo "🔑 Trying token: $NAME..."
            OUTPUT=$(CLOUDFLARE_API_TOKEN="$TOKEN" CLOUDFLARE_ACCOUNT_ID="$CF_ACCOUNT_ID" \
              wrangler pages deploy ./dist \
              --project-name=islamic-reminders-hub \
              --branch=main \
              --commit-dirty=true 2>&1)
            EXIT_CODE=$?
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ SUCCESS with token: $NAME"
              echo "$OUTPUT"
              DEPLOYED=true
              break
            else
              ERR=$(echo "$OUTPUT" | grep -i "error\|host not\|allowlist\|unauthorized\|permission" | head -3)
              echo "❌ Failed with $NAME: $ERR"
            fi
          done

          if [ "$DEPLOYED" = true ]; then
            echo ""
            echo "🎉 Deployment successful!"
            echo "🔗 https://islamic-reminders-hub.pages.dev"
          else
            echo ""
            echo "❌ ALL TOKENS FAILED"
            echo "All tokens have IP restrictions blocking GitHub Actions."
            echo "Fix: Create a new Cloudflare API Token with NO IP filtering"
            echo "  - Permission: Cloudflare Pages:Edit + Account Settings:Read"
            echo "  - NO Client IP Address Filtering"
            echo "  - Add as CLOUDFLARE_API_TOKEN secret in GitHub"
            exit 1
          fi
