name: 🚀 Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      dist-path: artifacts/adhkar/dist/public

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 🟢 Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🎨 Build TailwindCSS
        run: pnpm run build:css:prod

      - name: 🏗️ Build Application
        run: pnpm --filter @workspace/adhkar run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: 📦 Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-public
          path: artifacts/adhkar/dist/public
          retention-days: 7

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: ☁️ Deploy to Cloudflare Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}

    permissions:
      contents: read
      deployments: write

    steps:
      - name: 📥 Download Build
        uses: actions/download-artifact@v4
        with:
          name: dist-public
          path: ./dist

      - name: ☁️ Publish to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: islamic-reminders-hub
          directory: ./dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      - name: 🎉 Deploy Complete
        run: echo "✅ Live at https://islamic-reminders-hub.pages.dev"
