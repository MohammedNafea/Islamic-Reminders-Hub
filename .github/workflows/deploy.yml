name: 🚀 Deploy to GitHub Pages + Cloudflare CDN

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: 🏗️ Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 📥 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🎨 Build CSS
        run: pnpm run build:css:prod

      - name: 🏗️ Build App
        run: pnpm --filter @workspace/adhkar run build
        env:
          NODE_ENV: production
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: 📂 Prepare for GitHub Pages
        run: |
          # Copy dist to gh-pages folder
          cp -r artifacts/adhkar/dist/public ./gh-pages-dist
          # Add .nojekyll to bypass Jekyll processing
          touch ./gh-pages-dist/.nojekyll
          # Ensure _redirects exists for SPA routing
          echo "/* /index.html 200" > ./gh-pages-dist/_redirects
          echo "adhkar.thedarkgalaxy.com" > ./gh-pages-dist/CNAME
          # Copy all public files (404, robots, sitemap, browserconfig)
          for f in 404.html robots.txt sitemap.xml browserconfig.xml _headers _redirects; do
            [ -f "artifacts/adhkar/public/$f" ] && cp "artifacts/adhkar/public/$f" "./gh-pages-dist/$f"
          done
          echo "✅ Build ready: $(ls gh-pages-dist | wc -l) files"

      - name: 🚀 Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GH_DEPLOY_TOKEN || secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages-dist
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "deploy: update site from ${{ github.sha }}"

      - name: 🌐 Also Try Cloudflare Pages (if token works)
        continue-on-error: true
        env:
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler@latest
          TOKENS=("${{ secrets.CF_TOKEN_EDIT_ALL }}" "${{ secrets.CF_TOKEN_MMM }}" "${{ secrets.CF_TOKEN_GUARDIAN }}" "${{ secrets.CF_TOKEN_PAGES_DEPLOY }}" "${{ secrets.CLOUDFLARE_API_TOKEN }}")
          NAMES=("EDIT_ALL" "MMM" "GUARDIAN" "PAGES_DEPLOY" "API_TOKEN")
          for i in "${!TOKENS[@]}"; do
            TOKEN="${TOKENS[$i]}"
            NAME="${NAMES[$i]}"
            [ -z "$TOKEN" ] && continue
            echo "🔑 Trying $NAME..."
            OUTPUT=$(CLOUDFLARE_API_TOKEN="$TOKEN" CLOUDFLARE_ACCOUNT_ID="$CF_ACCOUNT_ID" \
              wrangler pages deploy ./gh-pages-dist \
              --project-name=islamic-reminders-hub \
              --branch=main --commit-dirty=true 2>&1)
            if [ $? -eq 0 ]; then
              echo "✅ Cloudflare Pages deployed with $NAME!"
              echo "$OUTPUT" | tail -5
              break
            fi
          done

      # ─── Deploy Cloudflare Worker (handles HTTPS + security) ────────────────
      - name: ☁️ Deploy Cloudflare Worker (Security Layer)
        continue-on-error: true
        run: |
          npm install -g wrangler@latest
          TOKENS=("${{ secrets.CF_TOKEN_EDIT_ALL }}" "${{ secrets.CF_TOKEN_MMM }}" "${{ secrets.CF_TOKEN_WORKERS_EDIT }}" "${{ secrets.CF_TOKEN_GUARDIAN }}")
          NAMES=("EDIT_ALL" "MMM" "WORKERS_EDIT" "GUARDIAN")
          for i in "${!TOKENS[@]}"; do
            TOKEN="${TOKENS[$i]}"
            NAME="${NAMES[$i]}"
            [ -z "$TOKEN" ] && continue
            echo "🔑 Trying $NAME..."
            OUTPUT=$(CLOUDFLARE_API_TOKEN="$TOKEN" CLOUDFLARE_ACCOUNT_ID="${{ secrets.CLOUDFLARE_ACCOUNT_ID }}"               wrangler deploy cloudflare-worker/worker.js               --name adhkar-hub               --compatibility-date 2024-01-01               --route "adhkar.thedarkgalaxy.com/*" 2>&1) && {
              echo "✅ Cloudflare Worker deployed!"
              break
            }
          done
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 🎉 Deploy Complete
        run: |
          echo "=================================="
          echo "✅ DEPLOYED SUCCESSFULLY!"
          echo "🔗 GitHub Pages: https://mohammednafea.github.io/Islamic-Reminders-Hub/"
          echo "🔗 Custom domain: https://adhkar.thedarkgalaxy.com"
          echo "🔐 HTTPS enforced via Cloudflare Worker"
          echo "=================================="
